<svg xmlns="http://www.w3.org/2000/svg" width="900" height="320" viewBox="0 0 900 320" role="img" aria-label="ISO sizing guide for online cash">
  <rect width="900" height="320" fill="#0f172a" rx="16" />
  <text x="32" y="40" fill="#e2e8f0" font-size="20" font-family="Inter, Arial, sans-serif" font-weight="600">ISO sizing guide (online cash)</text>
  <text x="32" y="64" fill="#94a3b8" font-size="12" font-family="Inter, Arial, sans-serif">Baseline: 3bb + 1bb per limper. Adjust with table texture and stack depth.</text>

  <!-- size ladder -->
  <g font-family="Inter, Arial, sans-serif" font-size="14" fill="#e2e8f0">
    <text x="32" y="112">1 limper</text>
    <rect x="150" y="96" width="180" height="26" rx="8" fill="#38bdf8" />
    <text x="350" y="114" fill="#bae6fd">4bb</text>

    <text x="32" y="156">2 limpers</text>
    <rect x="150" y="140" width="230" height="26" rx="8" fill="#38bdf8" />
    <text x="400" y="158" fill="#bae6fd">5bb</text>

    <text x="32" y="200">3+ limpers</text>
    <rect x="150" y="184" width="280" height="26" rx="8" fill="#38bdf8" />
    <text x="450" y="202" fill="#bae6fd">6bb</text>
  </g>

  <!-- adjustments box -->
  <rect x="520" y="96" width="348" height="136" rx="12" fill="#111827" />
  <text x="540" y="120" fill="#e2e8f0" font-size="13" font-family="Inter, Arial, sans-serif" font-weight="600">Adjustments</text>
  <g font-family="Inter, Arial, sans-serif" font-size="12.5" fill="#e2e8f0">
    <text x="540" y="144">+1bb vs sticky blinds / loose callers</text>
    <text x="540" y="164">+1bb with value hands that want calls</text>
    <text x="540" y="184">-0.5 to -1bb at 40bb or less</text>
    <text x="540" y="204">-0.5bb IP vs tight blinds</text>
  </g>

  <text x="32" y="288" fill="#94a3b8" font-size="11.5" font-family="Inter, Arial, sans-serif">Goal: isolate limper heads-up; if you keep going multiway, size up.</text>
</svg>
