<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360" role="img" aria-label="Preflop decision flow">
  <rect width="960" height="360" fill="#0f172a" rx="20"/>
  <text x="40" y="55" fill="#e2e8f0" font-family="Inter,Arial" font-size="28" font-weight="700">Preflop Decision Flow</text>
  <rect x="40" y="90" width="250" height="200" rx="14" fill="#1e293b" stroke="#38bdf8"/>
  <text x="65" y="130" fill="#bae6fd" font-size="20" font-family="Inter,Arial">1) Position</text>
  <text x="65" y="165" fill="#cbd5e1" font-size="16" font-family="Inter,Arial">UTG → MP → CO → BTN → SB → BB</text>
  <rect x="355" y="90" width="250" height="200" rx="14" fill="#1e293b" stroke="#a78bfa"/>
  <text x="380" y="130" fill="#ddd6fe" font-size="20" font-family="Inter,Arial">2) Action Before You</text>
  <text x="380" y="165" fill="#cbd5e1" font-size="16" font-family="Inter,Arial">Folded to you / Open / 3-bet</text>
  <rect x="670" y="90" width="250" height="200" rx="14" fill="#1e293b" stroke="#34d399"/>
  <text x="695" y="130" fill="#bbf7d0" font-size="20" font-family="Inter,Arial">3) Choose Line</text>
  <text x="695" y="165" fill="#cbd5e1" font-size="16" font-family="Inter,Arial">Open • Call • 3-bet • Fold</text>
  <line x1="290" y1="190" x2="355" y2="190" stroke="#94a3b8" stroke-width="4"/>
  <line x1="605" y1="190" x2="670" y2="190" stroke="#94a3b8" stroke-width="4"/>
</svg>
